AWSTemplateFormatVersion: '2010-09-09'
Description: Echomitter landing page hosting (S3 + CloudFront + Route53)

Parameters:
  Stage:
    Type: String
    Default: production
    AllowedPattern: '^[a-z0-9-]+$'
  DomainName:
    Type: String
    Description: Primary domain for the landing page (e.g. echomitter.com)
  WwwDomainName:
    Type: String
    Default: ''
    Description: Optional www domain (e.g. www.echomitter.com)
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for DomainName
  CertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 for DomainName (+ optional WwwDomainName)

Conditions:
  HasWwwDomain: !Not [!Equals [!Ref WwwDomainName, '']]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'echomitter-landing-${Stage}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled

  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'echomitter-landing-${Stage}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub 'echomitter-landing-${Stage}-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless URLs to html files
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          if (uri === '/invite-warden' || uri === '/invite-warden.html' || uri.indexOf('/invite-warden/') === 0) {
            return {
              statusCode: 404,
              statusDescription: 'Not Found',
              headers: {
                'content-type': { value: 'text/plain; charset=UTF-8' },
                'cache-control': { value: 'no-store' }
              },
              body: 'Not Found'
            };
          }

          if (uri === '/') {
            return request;
          }

          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
            return request;
          }

          if (!uri.includes('.')) {
            request.uri = uri + '.html';
          }

          return request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !If [HasWwwDomain, !Ref WwwDomainName, !Ref AWS::NoValue]
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: site-s3
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref SiteOAC
        DefaultCacheBehavior:
          TargetOriginId: site-s3
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SiteRewriteFunction.FunctionARN
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}'

  RootARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RootAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwARecord:
    Type: AWS::Route53::RecordSet
    Condition: HasWwwDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref WwwDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAAAARecord:
    Type: AWS::Route53::RecordSet
    Condition: HasWwwDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref WwwDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
    Export:
      Name: !Sub 'Echomitter-LandingBucket-${Stage}'
  SiteDistributionId:
    Value: !Ref SiteDistribution
    Export:
      Name: !Sub 'Echomitter-LandingDistributionId-${Stage}'
  SiteDomainName:
    Value: !GetAtt SiteDistribution.DomainName
