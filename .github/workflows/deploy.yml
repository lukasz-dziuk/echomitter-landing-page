name: Deploy Landing (production)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: landing-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      STACK_NAME: ${{ secrets.LANDING_STACK_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve landing outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${STACK_NAME}" ]; then
            echo "LANDING_STACK_NAME secret is required" >&2
            exit 1
          fi

          STACK_JSON=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME")

          BUCKET_NAME=$(echo "$STACK_JSON" | jq -r '.Stacks[0].Outputs[] | select(.OutputKey=="SiteBucketName") | .OutputValue')
          DISTRIBUTION_ID=$(echo "$STACK_JSON" | jq -r '.Stacks[0].Outputs[] | select(.OutputKey=="SiteDistributionId") | .OutputValue')

          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "null" ]; then
            echo "SiteBucketName output not found in stack $STACK_NAME" >&2
            exit 1
          fi

          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "null" ]; then
            echo "SiteDistributionId output not found in stack $STACK_NAME" >&2
            exit 1
          fi

          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Build static bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          cp invite-warden.html dist/invite-warden.html

      - name: Upload landing files
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync dist "s3://${{ steps.outputs.outputs.bucket_name }}" --delete --exclude "*.html"
          aws s3 sync dist "s3://${{ steps.outputs.outputs.bucket_name }}" --delete --exclude "*" --include "*.html" --cache-control "no-store, no-cache, must-revalidate"

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution_id }}" \
            --paths "/" "/index.html" "/invite-warden" "/invite-warden.html"
